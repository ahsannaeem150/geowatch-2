<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoWatch — Tile Server Test</title>
  <script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f1117;
      color: #e8e9ec;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      padding: 16px 24px;
      background: #1a1d29;
      border-bottom: 1px solid #2a2e3b;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #00d4ff;
      letter-spacing: -0.3px;
    }
    header .status {
      font-size: 12px;
      color: #2ed573;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    header .status::before {
      content: '';
      width: 8px;
      height: 8px;
      background: #2ed573;
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(46, 213, 115, 0.4);
    }
    #map {
      flex: 1;
      width: 100%;
    }
    .info-panel {
      position: absolute;
      bottom: 24px;
      left: 24px;
      background: rgba(26, 29, 41, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid #2a2e3b;
      padding: 16px 20px;
      border-radius: 4px;
      font-size: 13px;
      line-height: 1.6;
      max-width: 320px;
      pointer-events: none;
      z-index: 10;
    }
    .info-panel strong {
      color: #00d4ff;
      font-weight: 500;
    }
    .info-panel code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      background: #14161f;
      padding: 2px 6px;
      border-radius: 2px;
      color: #8b8f9a;
    }
  </style>
</head>
<body>
  <header>
    <h1>GeoWatch Tile Server Test</h1>
    <div class="status">Martin Online</div>
  </header>
  <div id="map"></div>
  <div class="info-panel">
    <strong>Style:</strong> GeoWatch Dark Minimal<br />
    <strong>Source:</strong> Self-hosted Martin<br />
    <strong>URL:</strong> <code>localhost:8080/tiles</code><br />
    <strong>MBTiles:</strong> <code>tiles.mbtiles</code><br />
    <br />
    <span style="color: #8b8f9a;">If you see a dark world map, everything is working correctly.</span>
  </div>

  <script>
    const style = {
  "version": 8,
  "name": "GeoWatch Dark Minimal",
  "metadata": {
    "maputnik:renderer": "mbgljs"
  },
  "center": [
    0,
    20
  ],
  "zoom": 2,
  "bearing": 0,
  "pitch": 0,
  "sources": {
    "openmaptiles": {
      "type": "vector",
      "url": "http://localhost:8080/tiles"
    }
  },
  "sprite": "",
  "layers": [
    {
      "id": "background",
      "type": "background",
      "paint": {
        "background-color": "#0f1117"
      }
    },
    {
      "id": "water",
      "type": "fill",
      "source": "openmaptiles",
      "source-layer": "water",
      "filter": [
        "==",
        "$type",
        "Polygon"
      ],
      "paint": {
        "fill-color": "#14161f",
        "fill-outline-color": "#1a1d29"
      }
    },
    {
      "id": "waterway",
      "type": "line",
      "source": "openmaptiles",
      "source-layer": "waterway",
      "filter": [
        "==",
        "$type",
        "LineString"
      ],
      "layout": {
        "visibility": "visible"
      },
      "paint": {
        "line-color": "#1a1d29",
        "line-width": 1
      }
    },
    {
      "id": "landcover-glacier",
      "type": "fill",
      "source": "openmaptiles",
      "source-layer": "landcover",
      "filter": [
        "==",
        "subclass",
        "glacier"
      ],
      "paint": {
        "fill-color": "#161822",
        "fill-opacity": 0.6
      }
    },
    {
      "id": "landuse-residential",
      "type": "fill",
      "source": "openmaptiles",
      "source-layer": "landuse",
      "filter": [
        "==",
        "class",
        "residential"
      ],
      "paint": {
        "fill-color": "#13151c"
      }
    },
    {
      "id": "landuse-industrial",
      "type": "fill",
      "source": "openmaptiles",
      "source-layer": "landuse",
      "filter": [
        "==",
        "class",
        "industrial"
      ],
      "paint": {
        "fill-color": "#11131a"
      }
    },
    {
      "id": "landuse-cemetery",
      "type": "fill",
      "source": "openmaptiles",
      "source-layer": "landuse",
      "filter": [
        "==",
        "class",
        "cemetery"
      ],
      "paint": {
        "fill-color": "#11131a"
      }
    },
    {
      "id": "landuse-hospital",
      "type": "fill",
      "source": "openmaptiles",
      "source-layer": "landuse",
      "filter": [
        "==",
        "class",
        "hospital"
      ],
      "paint": {
        "fill-color": "#11131a"
      }
    },
    {
      "id": "landuse-school",
      "type": "fill",
      "source": "openmaptiles",
      "source-layer": "landuse",
      "filter": [
        "==",
        "class",
        "school"
      ],
      "paint": {
        "fill-color": "#11131a"
      }
    },
    {
      "id": "landuse-park",
      "type": "fill",
      "source": "openmaptiles",
      "source-layer": "landuse",
      "filter": [
        "==",
        "class",
        "park"
      ],
      "paint": {
        "fill-color": "#11131a"
      }
    },
    {
      "id": "landuse-pitch",
      "type": "fill",
      "source": "openmaptiles",
      "source-layer": "landuse",
      "filter": [
        "==",
        "class",
        "pitch"
      ],
      "paint": {
        "fill-color": "#0e1015"
      }
    },
    {
      "id": "boundary-land-level-4",
      "type": "line",
      "source": "openmaptiles",
      "source-layer": "boundary",
      "filter": [
        "==",
        "admin_level",
        4
      ],
      "layout": {
        "line-cap": "round",
        "line-join": "round",
        "visibility": "visible"
      },
      "paint": {
        "line-color": "#2a2e3b",
        "line-width": 1,
        "line-dasharray": [
          3,
          2
        ]
      }
    },
    {
      "id": "boundary-land-level-2",
      "type": "line",
      "source": "openmaptiles",
      "source-layer": "boundary",
      "filter": [
        "==",
        "admin_level",
        2
      ],
      "layout": {
        "line-cap": "round",
        "line-join": "round",
        "visibility": "visible"
      },
      "paint": {
        "line-color": "#3a3e4b",
        "line-width": 1.5
      }
    },
    {
      "id": "boundary-water",
      "type": "line",
      "source": "openmaptiles",
      "source-layer": "boundary",
      "filter": [
        "==",
        "maritime",
        1
      ],
      "layout": {
        "line-cap": "round",
        "line-join": "round"
      },
      "paint": {
        "line-color": "#1a1d29",
        "line-width": 1,
        "line-dasharray": [
          4,
          2
        ]
      }
    },
    {
      "id": "transportation-motorway",
      "type": "line",
      "source": "openmaptiles",
      "source-layer": "transportation",
      "filter": [
        "all",
        [
          "==",
          "$type",
          "LineString"
        ],
        [
          "==",
          "class",
          "motorway"
        ]
      ],
      "layout": {
        "line-cap": "round",
        "line-join": "round",
        "visibility": "visible"
      },
      "paint": {
        "line-color": "#2a2e3b",
        "line-width": 1
      }
    },
    {
      "id": "transportation-trunk",
      "type": "line",
      "source": "openmaptiles",
      "source-layer": "transportation",
      "filter": [
        "all",
        [
          "==",
          "$type",
          "LineString"
        ],
        [
          "==",
          "class",
          "trunk"
        ]
      ],
      "layout": {
        "line-cap": "round",
        "line-join": "round",
        "visibility": "visible"
      },
      "paint": {
        "line-color": "#252935",
        "line-width": 0.8
      }
    },
    {
      "id": "transportation-primary",
      "type": "line",
      "source": "openmaptiles",
      "source-layer": "transportation",
      "filter": [
        "all",
        [
          "==",
          "$type",
          "LineString"
        ],
        [
          "==",
          "class",
          "primary"
        ]
      ],
      "layout": {
        "line-cap": "round",
        "line-join": "round",
        "visibility": "visible"
      },
      "paint": {
        "line-color": "#222636",
        "line-width": 0.6
      }
    },
    {
      "id": "transportation-secondary",
      "type": "line",
      "source": "openmaptiles",
      "source-layer": "transportation",
      "filter": [
        "all",
        [
          "==",
          "$type",
          "LineString"
        ],
        [
          "==",
          "class",
          "secondary"
        ]
      ],
      "layout": {
        "line-cap": "round",
        "line-join": "round",
        "visibility": "visible"
      },
      "paint": {
        "line-color": "#1e212b",
        "line-width": 0.5
      }
    },
    {
      "id": "transportation-rail",
      "type": "line",
      "source": "openmaptiles",
      "source-layer": "transportation",
      "filter": [
        "all",
        [
          "==",
          "$type",
          "LineString"
        ],
        [
          "==",
          "class",
          "rail"
        ]
      ],
      "layout": {
        "visibility": "visible"
      },
      "paint": {
        "line-color": "#2a2e3b",
        "line-width": 0.5
      }
    }
  ],
  "id": "geowatch-dark-minimal"
};

    const map = new maplibregl.Map({
      container: 'map',
      style: style,
      center: [20, 30],
      zoom: 2,
      attributionControl: false
    });

    map.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-right');
    map.addControl(new maplibregl.NavigationControl(), 'top-right');

    map.on('load', () => {
      console.log('✅ Map loaded successfully — tiles are rendering');
    });

    map.on('error', (e) => {
      console.error('❌ Map error:', e.error);
      document.querySelector('.status').textContent = 'Map Error';
      document.querySelector('.status').style.color = '#ff4757';
    });
  </script>
</body>
</html>
